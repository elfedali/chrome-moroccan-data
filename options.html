<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Extension Options</title>
    <link rel="stylesheet" href="styles/output.css" />
</head>

<body class="min-h-screen bg-slate-50 text-slate-900">
    <main class="mx-auto max-w-2xl p-6">
        <header class="mb-6">
            <h1 class="text-xl font-semibold">Options</h1>
            <p class="mt-1 text-sm text-slate-600">Stored in <code
                    class="rounded bg-slate-200 px-1 py-0.5">chrome.storage.local</code>.</p>
        </header>

        <section class="rounded-xl border border-slate-200 bg-white p-4">
            <label for="note" class="block text-sm font-medium text-slate-700">Saved note</label>
            <textarea id="note" rows="4"
                class="mt-2 w-full rounded-lg border border-slate-300 p-2 text-sm outline-none focus:border-slate-400"
                placeholder="Type something…"></textarea>

            <div class="mt-3 flex gap-2">
                <button id="saveBtn" type="button"
                    class="inline-flex items-center justify-center rounded-lg bg-blue-600 px-3 py-2 text-sm font-medium text-white hover:bg-blue-700">
                    Save
                </button>
                <button id="clearBtn" type="button"
                    class="inline-flex items-center justify-center rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-800 hover:bg-slate-50">
                    Clear
                </button>
                <span id="status" class="ml-auto self-center text-sm text-slate-600"></span>
            </div>
        </section>
    </main>

    <script type="module" src="options.js"></script>
</body>

</html>
