<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Moroccan Data</title>
    <link rel="stylesheet" href="styles/output.css" />
</head>

<body class="w-[360px] bg-white text-slate-900">
    <main class="p-3">
        <header class="mb-2">
            <h1 class="text-base font-semibold">Moroccan Data</h1>
            <p class="text-xs text-slate-600">Extension scaffold</p>
        </header>

        <section class="mb-3 rounded-xl border border-slate-200 bg-white p-3">
            <div class="flex items-center justify-between gap-2">
                <span class="text-xs font-medium text-slate-700">Active tab</span>
                <span id="tabInfo" class="max-w-[240px] truncate text-xs text-slate-900" title="">Loading…</span>
            </div>

            <div class="mt-3 flex gap-2">
                <button id="fillFormBtn" type="button"
                    class="flex-1 rounded-lg bg-green-600 px-3 py-2 text-xs font-medium text-white hover:bg-green-700">
                    Fill form with fake data
                </button>
                <button id="pingBtn" type="button"
                    class="flex-1 rounded-lg border border-slate-300 bg-white px-3 py-2 text-xs font-medium text-slate-800 hover:bg-slate-50">
                    Ping
                </button>
            </div>

            <pre id="output" aria-live="polite"
                class="mt-2 min-h-[28px] whitespace-pre-wrap break-words rounded-lg border border-slate-200 bg-slate-50 p-2 text-xs text-slate-900"></pre>
        </section>

        <section class="rounded-xl border border-slate-200 bg-white p-3">
            <label class="block text-xs font-medium text-slate-700" for="note">Saved note (chrome.storage)</label>
            <textarea id="note" rows="3"
                class="mt-2 w-full resize-y rounded-lg border border-slate-300 p-2 text-xs outline-none focus:border-slate-400"
                placeholder="Type something…"></textarea>
            <div class="mt-2 flex gap-2">
                <button id="saveBtn" type="button"
                    class="flex-1 rounded-lg bg-blue-600 px-3 py-2 text-xs font-medium text-white hover:bg-blue-700">
                    Save
                </button>
                <button id="clearBtn" type="button"
                    class="flex-1 rounded-lg border border-slate-300 bg-white px-3 py-2 text-xs font-medium text-slate-800 hover:bg-slate-50">
                    Clear
                </button>
            </div>
        </section>
    </main>

    <script type="module" src="popup.js"></script>
</body>

</html>
