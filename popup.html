<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Moroccan Data</title>
    <link rel="stylesheet" href="styles/output.css" />
</head>

<body class="w-[360px] bg-white text-slate-900">
    <main class="p-3">
        <header class="mb-2">
            <h1 class="text-base font-semibold">Moroccan Data</h1>
            <p class="text-xs text-slate-600">Quick login</p>
        </header>

        <section class="rounded-xl border border-slate-200 bg-white p-3">
            <h2 class="text-xs font-semibold text-slate-900">Users</h2>
            <p class="mt-1 text-[11px] text-slate-600">Click a user to fill Email + Password on the current tab.</p>

            <div class="mt-3 flex gap-2">
                <button id="fillFakeBtn" type="button"
                    class="flex-1 rounded-lg bg-green-600 px-3 py-2 text-xs font-medium text-white hover:bg-green-700">
                    Fill fake data
                </button>
                <button id="openOptionsBtn" type="button"
                    class="flex-1 rounded-lg border border-slate-300 bg-white px-3 py-2 text-xs font-medium text-slate-800 hover:bg-slate-50">
                    Add user
                </button>
            </div>

            <div id="users" class="mt-3 space-y-2"></div>

            <pre id="output" aria-live="polite"
                class="mt-3 min-h-[28px] whitespace-pre-wrap break-words rounded-lg border border-slate-200 bg-slate-50 p-2 text-xs text-slate-900"></pre>
        </section>
    </main>

    <script type="module" src="popup.js"></script>
</body>

</html>
